<!DOCTYPE html>
<html lang="kk" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f5ebe0">
<title>QazaqTanu - Қазақ Тілі Үйрену / 哈萨克语学习</title>
<link rel="manifest" href="data:application/json,{}">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🥟</text></svg>">
<style>
/* ===== KAZAKH INSPIRED DESIGN ===== */
/* Warm, earthy palette — like a Kazakh yurt */
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;600;700&family=Noto+Serif+Display:wght@700;800&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-page:#f5ebe0;--bg-main:#faf3ed;--bg-card:#fdf8f4;--bg-hover:#f7eee7;
  --text:#2c1810;--text2:#8b6f5e;--text-muted:#b89a88;
  --kz-blue:#00a7b5;--kz-gold:#d4a547;--kz-red:#c0392b;--kz-green:#4a9e6b;
  --kz-blue-soft:rgba(0,167,181,0.08);--kz-gold-soft:rgba(212,165,71,0.12);
  --kz-red-soft:rgba(192,57,43,0.07);
  --border:rgba(139,111,94,0.15);--border-strong:rgba(139,111,94,0.25);
  --radius:10px;--radius-sm:6px;
  --shadow:0 2px 8px rgba(44,24,16,0.06);--shadow-lg:0 4px 16px rgba(44,24,16,0.1);
  --font-sm:13px;--font-md:15px;--font-lg:17px;
  --zh-color:#c0392b;--cyr-color:#00a7b5;--arab-color:#4a9e6b;--lat-color:#d4a547;
  /* backward compat for JS inline styles */
  --primary:var(--kz-blue);--primary2:#008a96;--accent:var(--kz-red);--gold:var(--kz-gold);
  --green:var(--kz-green);--orange:var(--kz-gold);--glass:var(--bg-page);--card-hover:var(--bg-hover);
  --glass-border:var(--border);
}
html{font-size:var(--font-md);scroll-behavior:smooth}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans Arabic',sans-serif;
  background:var(--bg-page);color:var(--text);
  min-height:100vh;line-height:1.7;overflow-x:hidden;
  background-image:
    radial-gradient(circle at 10% 20%, rgba(212,165,71,0.04) 0%, transparent 50%),
    radial-gradient(circle at 90% 80%, rgba(0,167,181,0.04) 0%, transparent 50%);
}
a{color:var(--kz-blue);text-decoration:none;font-weight:500}
a:hover{text-decoration:underline}
img{max-width:100%}
button{cursor:pointer;border:none;outline:none;font-family:inherit;font-size:inherit;
  min-height:42px;min-width:42px;border-radius:var(--radius-sm);transition:all .18s ease;
  display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:7px 14px}
button:active{transform:scale(0.97)}
input,textarea,select{font-family:inherit;font-size:inherit;
  border-radius:var(--radius-sm);border:1px solid var(--border);
  background:#fff;color:var(--text);padding:9px 12px;outline:none;width:100%}
input:focus,textarea:focus{border-color:var(--kz-blue);box-shadow:0 0 0 2px var(--kz-blue-soft)}
::selection{background:var(--kz-gold-soft);color:var(--text)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--text-muted);border-radius:3px}

/* ===== UTILITIES ===== */
.container{max-width:960px;margin:0 auto;padding:16px}
.hidden{display:none!important}
.fade-in{animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes glow{0%,100%{box-shadow:0 0 0 2px var(--kz-gold-soft)}50%{box-shadow:0 0 0 4px rgba(212,165,71,0.2)}}
.rtl{direction:rtl;text-align:right}
.ltr{direction:ltr;text-align:left}
.badge{display:inline-flex;align-items:center;gap:3px;padding:1px 8px;
  border-radius:12px;font-size:.78em;font-weight:600}

/* ===== KAZAKH ORNAMENT BAR ===== */
.kz-ornament{
  height:6px;
  background:repeating-linear-gradient(
    90deg,
    var(--kz-blue) 0px, var(--kz-blue) 20px,
    var(--kz-gold) 20px, var(--kz-gold) 40px,
    var(--kz-red) 40px, var(--kz-red) 60px
  );
  opacity:0.7;
}

/* ===== HEADER ===== */
.header{
  background:#fff;border-bottom:1px solid var(--border);padding:0;
  position:sticky;top:0;z-index:100;
}
.header-inner{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;padding:10px 16px}
.header-title{font-family:'Noto Serif Display',Georgia,serif;font-size:1.25em;font-weight:800;color:var(--kz-blue);letter-spacing:-.3px}
.header-title .logo-emoji{font-size:.85em;margin-right:3px}
.header-actions{display:flex;gap:5px;flex-wrap:wrap}
.header-actions button{background:var(--bg-main);color:var(--text2);border:1px solid var(--border);
  padding:5px 10px;border-radius:var(--radius-sm);font-size:.8em;min-height:34px;min-width:34px}
.header-actions button:hover{background:var(--bg-hover);color:var(--text)}
.search-box{display:flex;align-items:center;background:#fff;border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:0 8px;flex:1;min-width:120px;max-width:240px}
.search-box input{border:none;background:transparent;padding:6px 4px;font-size:.82em}
.search-box input::placeholder{color:var(--text-muted)}
.search-box .icon{color:var(--text-muted);font-size:.8em}

/* ===== GREETING ===== */
.greeting{text-align:center;padding:20px 0 10px;animation:fadeIn .6s ease}
.greeting h2{font-family:'Noto Serif Display',Georgia,serif;font-size:1.5em;font-weight:800;color:var(--kz-blue);margin-bottom:4px}
.greeting p{color:var(--text2);font-size:.9em;font-style:italic}

/* ===== HOME BUTTONS ===== */
.home-btns{display:flex;flex-direction:column;gap:12px;padding:16px 0;max-width:600px;margin:0 auto}
.home-btn{width:100%;min-height:72px;border-radius:var(--radius);font-size:1em;font-weight:600;
  padding:14px 20px;color:#fff;border:none;transition:all .2s;
  justify-content:center;text-align:center;position:relative;overflow:hidden}
.home-btn::after{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.12),transparent 50%);pointer-events:none}
.home-btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-lg)}
.home-btn:active{transform:translateY(0)}
.home-btn.zh-cyr{background:linear-gradient(135deg,#d4563e,#b8432e)}
.home-btn.arab-cyr{background:linear-gradient(135deg,#3a8f6a,#2d7355)}
.home-btn.zh-arab{background:linear-gradient(135deg,#c99535,#b07d28)}
.home-btn.cyr-lat{background:linear-gradient(135deg,#008f9c,#007280)}
.home-btn .sub{display:block;font-size:.6em;font-weight:400;opacity:.8;margin-top:3px}

/* ===== TAB NAV ===== */
.tab-bar{display:flex;gap:6px;padding:12px 0;flex-wrap:wrap;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-bar button{background:#fff;color:var(--text2);border:1px solid var(--border);
  padding:8px 14px;font-size:.85em;white-space:nowrap;flex-shrink:0;border-radius:var(--radius-sm)}
.tab-bar button:hover{background:var(--bg-hover);color:var(--text);border-color:var(--border-strong)}
.tab-bar button.active{background:var(--kz-blue);color:#fff;border-color:var(--kz-blue);font-weight:600}

/* ===== BACK BUTTON ===== */
.back-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;
  background:#fff;color:var(--text2);border:1px solid var(--border);
  border-radius:var(--radius-sm);font-size:.85em;margin:6px 0}
.back-btn:hover{background:var(--bg-hover);color:var(--text)}

/* ===== SECTION ===== */
.section{animation:fadeIn .3s ease;padding:6px 0}
.section-title{font-family:'Noto Serif Display',Georgia,serif;font-size:1.15em;font-weight:700;margin-bottom:14px;padding-bottom:6px;
  border-bottom:2px solid var(--kz-gold);color:var(--text)}

/* ===== CARD ===== */
.card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);
  padding:18px;margin-bottom:14px;transition:all .15s;box-shadow:var(--shadow)}
.card:hover{box-shadow:var(--shadow-lg)}

/* ===== ALPHABET ===== */
.alphabet-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.letter-card{border-radius:var(--radius);padding:18px;background:#fff;
  border:1px solid var(--border);transition:all .15s;box-shadow:var(--shadow)}
.letter-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px)}
.letter-card .letter-display{display:flex;align-items:baseline;gap:10px;margin-bottom:10px;padding-bottom:10px;
  border-bottom:1px dashed var(--border)}
.letter-card .letter-main{font-size:2.2em;font-weight:800;color:var(--kz-blue)}
.letter-card .letter-hand{font-size:1.5em;opacity:.6;font-style:italic;color:var(--text2)}
.letter-card .letter-ipa{font-size:.82em;color:var(--text-muted);background:var(--bg-page);
  padding:2px 8px;border-radius:4px;font-family:monospace}
.letter-card .mnemonic{font-size:.82em;color:var(--kz-red);margin-bottom:8px;padding:5px 10px;
  background:var(--kz-red-soft);border-radius:6px;border-left:3px solid var(--kz-red);font-style:italic}
.letter-card .examples{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.letter-card .examples .ex{background:var(--bg-main);padding:3px 8px;border-radius:4px;font-size:.82em}
.letter-card .examples .ex .meaning{font-size:.72em;color:var(--text2);display:block}
.letter-card .sentence{background:var(--bg-page);padding:8px 12px;border-radius:6px;font-size:.85em;margin-bottom:6px;
  border-left:3px solid var(--kz-green)}
.letter-card .tip{font-size:.78em;color:#8b6914;padding:5px 8px;
  background:var(--kz-gold-soft);border-radius:6px;border-left:3px solid var(--kz-gold)}
.letter-card .source{font-size:.72em;color:var(--text-muted);margin-top:6px;text-align:right}

/* ===== TRANSLITERATION TOOL ===== */
.translit-tabs{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.translit-tabs button{padding:6px 12px;font-size:.82em;background:#fff;color:var(--text2);
  border:1px solid var(--border);border-radius:var(--radius-sm)}
.translit-tabs button.active{background:var(--kz-blue);color:#fff;border-color:var(--kz-blue)}
.translit-area{display:flex;flex-direction:column;gap:10px}
.translit-row{display:flex;gap:8px;align-items:stretch}
.translit-row textarea{flex:1;min-height:90px;resize:vertical;padding:10px;font-size:1em;line-height:1.5}
.translit-actions{display:flex;gap:6px;flex-wrap:wrap}
.translit-actions button{font-size:.82em;padding:6px 12px;background:#fff;color:var(--text);
  border:1px solid var(--border)}
.translit-actions button.primary{background:var(--kz-blue);color:#fff;border-color:var(--kz-blue)}
.translit-actions button.primary:hover{background:#008a96}
.translit-actions button.danger{background:var(--kz-red);color:#fff}
.translit-actions button.danger:hover{background:#a93226}
.highlight-wrap{background:var(--bg-page);border-radius:var(--radius-sm);padding:10px;margin-top:6px;
  line-height:2;font-size:.95em;word-break:break-all}
.highlight-wrap .hl-src{color:var(--kz-blue)}
.highlight-wrap .hl-dst{color:var(--kz-green)}
.highlight-wrap .hl-pair{display:inline-block;margin:2px 3px;padding:1px 5px;
  background:var(--kz-blue-soft);border-radius:3px;border-bottom:2px solid var(--kz-blue)}
.error-msg{background:rgba(212,165,71,0.08);color:#8b6914;padding:8px;border-radius:6px;
  font-size:.82em;margin-top:6px;border:1px solid rgba(212,165,71,0.2)}
.error-msg::before{content:'⚠️ '}
.history-list{max-height:180px;overflow-y:auto;margin-top:6px}
.history-list .h-item{padding:6px;border-bottom:1px solid var(--border);font-size:.82em;
  cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.history-list .h-item:hover{background:var(--bg-hover)}

/* ===== PRACTICE ===== */
.practice-card{padding:20px;text-align:center}
.practice-card .q-text{font-size:1.6em;font-weight:700;margin-bottom:14px;min-height:50px;color:var(--text)}
.practice-card .options{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:360px;margin:0 auto}
.practice-card .options button{padding:12px;font-size:1em;background:#fff;color:var(--text);
  border:2px solid var(--border);border-radius:var(--radius);font-weight:500}
.practice-card .options button:hover{border-color:var(--kz-blue)}
.practice-card .options button.correct{border-color:var(--kz-green);background:rgba(74,158,107,0.08);color:var(--kz-green)}
.practice-card .options button.wrong{border-color:var(--kz-red);background:var(--kz-red-soft);color:var(--kz-red)}
.practice-card .progress{display:flex;gap:3px;justify-content:center;margin-bottom:14px}
.practice-card .progress .dot{width:10px;height:10px;border-radius:50%;background:var(--border)}
.practice-card .progress .dot.done{background:var(--kz-green)}
.practice-card .progress .dot.wrong{background:var(--kz-red)}
.practice-card .progress .dot.current{background:var(--kz-blue);animation:pulse 1s infinite}
.practice-card .result{font-size:1.15em;font-weight:700;margin:10px 0}
.practice-card .fill-input{display:flex;gap:6px;justify-content:center;margin:14px 0}
.practice-card .fill-input input{max-width:180px;text-align:center;font-size:1.1em;padding:10px}
.practice-card .fill-input button{background:var(--kz-blue);color:#fff;padding:10px 20px}
.practice-card .fill-input button:hover{background:#008a96}

/* ===== ERROR BOOK ===== */
.error-book .e-item{background:#fff;border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.error-book .e-item .e-count{background:var(--kz-red);color:#fff;border-radius:50%;
  width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:.75em;font-weight:700}

/* ===== PHRASES ===== */
.phrase-cats{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.phrase-cats button{padding:5px 12px;font-size:.8em;background:#fff;color:var(--text2);
  border:1px solid var(--border);border-radius:16px;white-space:nowrap}
.phrase-cats button.active{background:var(--kz-blue);color:#fff;border-color:var(--kz-blue)}
.phrase-list{display:grid;gap:6px}
.phrase-item{background:#fff;border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:10px 12px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.phrase-item .kk-text{font-size:1em;font-weight:500}
.phrase-item .zh-text{font-size:.82em;color:var(--text2)}
.phrase-item .fav-btn{font-size:1.1em;background:none;min-width:32px;min-height:32px;padding:0;
  color:var(--text-muted);border-radius:50%}
.phrase-item .fav-btn.active{color:var(--kz-gold)}

/* ===== LEARNING PLAN ===== */
.plan-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.plan-day{background:#fff;border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:14px;position:relative;transition:all .15s;box-shadow:var(--shadow)}
.plan-day.locked{opacity:.4;pointer-events:none}
.plan-day.completed{border-color:var(--kz-green);background:rgba(74,158,107,0.03)}
.plan-day.current{border-color:var(--kz-blue);animation:glow 2s infinite}
.plan-day .day-num{font-size:1.4em;font-weight:800;color:var(--kz-blue);margin-bottom:3px}
.plan-day .day-title{font-weight:600;margin-bottom:4px;font-size:.92em}
.plan-day .day-task{font-size:.82em;color:var(--text2)}
.plan-day .day-badge{position:absolute;top:8px;right:8px;font-size:.72em;
  background:var(--kz-green);color:#fff;padding:1px 7px;border-radius:8px}
.plan-day .day-lock{position:absolute;top:8px;right:8px;font-size:.9em;color:var(--text-muted)}
.day-quote{background:var(--bg-page);border-radius:6px;padding:10px;margin-top:10px;
  border-left:3px solid var(--kz-gold);font-size:.85em}
.day-quote .dq-text{font-style:italic}
.day-quote .dq-trans{color:var(--text2);font-size:.88em;margin-top:3px}
.day-quote .dq-scene{font-size:.78em;color:var(--kz-green);margin-top:3px}

/* ===== ACHIEVEMENTS ===== */
.achieve-grid{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
.achieve-item{width:64px;height:64px;border-radius:50%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;font-size:.65em;font-weight:600;
  background:#fff;border:2px solid var(--border);color:var(--text2);gap:1px;
  transition:all .15s}
.achieve-item.unlocked{border-color:var(--kz-gold);color:var(--kz-gold);background:var(--kz-gold-soft)}
.achieve-item .ach-emoji{font-size:1.4em}

/* ===== DICTATION ===== */
.dictation-area{text-align:center}
.dict-play{width:72px;height:72px;border-radius:50%;background:var(--kz-blue);
  color:#fff;margin:14px auto;display:flex;align-items:center;justify-content:center;
  transition:all .2s;cursor:pointer;border:none;font-size:1.6em}
.dict-play:hover{transform:scale(1.05);box-shadow:0 0 0 4px var(--kz-blue-soft)}
.dict-play:active{transform:scale(0.95)}
.dict-input{display:flex;gap:6px;justify-content:center;margin:10px 0}
.dict-input input{max-width:180px;text-align:center;font-size:1.1em}

/* ===== TOAST ===== */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;
  padding:10px 20px;border-radius:var(--radius-sm);background:#fff;color:var(--text);
  border:1px solid var(--border);box-shadow:var(--shadow-lg);
  animation:fadeIn .25s ease;font-size:.85em;max-width:90vw;text-align:center}
.toast.success{border-color:var(--kz-green);border-left:3px solid var(--kz-green)}
.toast.error{border-color:var(--kz-red);border-left:3px solid var(--kz-red)}
.toast.info{border-color:var(--kz-blue);border-left:3px solid var(--kz-blue)}

/* ===== BATCH UPLOAD ===== */
.batch-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:20px;
  text-align:center;cursor:pointer;transition:all .2s;margin:6px 0;background:#fff}
.batch-zone:hover,.batch-zone.dragover{border-color:var(--kz-blue);background:var(--kz-blue-soft)}
.batch-zone input{display:none}

/* SVG WRITING ANIMATION */
.svg-write{width:180px;height:70px;margin:6px auto;display:block}
.svg-write path{stroke-dasharray:1000;stroke-dashoffset:1000;animation:writeAnim 3s ease forwards}
@keyframes writeAnim{to{stroke-dashoffset:0}}

/* ===== RTL OVERRIDES ===== */
.rtl .letter-card{text-align:right}
.rtl .letter-card .letter-display{flex-direction:row-reverse}
.rtl .letter-card .sentence{border-left:none;border-right:3px solid var(--kz-green)}
.rtl .letter-card .mnemonic{border-left:none;border-right:3px solid var(--kz-red)}
.rtl .letter-card .tip{border-left:none;border-right:3px solid var(--kz-gold)}

/* ===== SPECIAL LETTERS SECTION ===== */
.special-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}
.special-card{border-radius:var(--radius);padding:14px;background:#fff;
  border:1px solid var(--border);transition:all .15s}
.special-card:hover{box-shadow:var(--shadow-lg)}
.special-card .sc-title{font-weight:700;font-size:1.05em;margin-bottom:5px;color:var(--kz-blue)}
.special-card .sc-compare{display:flex;gap:14px;align-items:center;margin:8px 0;flex-wrap:wrap}
.special-card .sc-compare span{font-size:1.6em;font-weight:700}
.special-card .sc-note{font-size:.82em;color:var(--text2);padding:5px 8px;
  background:var(--kz-gold-soft);border-radius:6px;border-left:3px solid var(--kz-gold)}

/* ===== EXPORT BUTTON ===== */
.export-btn{background:#fff;color:var(--text);border:1px solid var(--border);
  padding:6px 14px;border-radius:var(--radius-sm);font-size:.82em;display:inline-flex;align-items:center;gap:5px}
.export-btn:hover{background:var(--bg-hover)}

/* ===== RESPONSIVE ===== */
@media(max-width:600px){
  .container{padding:10px}
  .home-btn{min-height:64px;font-size:.92em;padding:10px 14px}
  .home-btn .sub{font-size:.55em}
  .alphabet-grid{grid-template-columns:1fr}
  .practice-card .options{grid-template-columns:1fr}
  .header-inner{flex-direction:column;gap:5px}
  .search-box{max-width:100%}
  .tab-bar button{padding:6px 10px;font-size:.8em}
  .letter-card .letter-main{font-size:1.8em}
  .plan-grid{grid-template-columns:1fr}
  .phrase-item{flex-wrap:wrap}
  .translit-row{flex-direction:column}
  .translit-row textarea{min-height:70px}
  .special-grid{grid-template-columns:1fr}
}

/* ===== LOADING ===== */

/* =====================================================================
   CORE: Navigation & Tab Switching
   ===================================================================== */
function navigate(page){
  document.querySelectorAll('.section[id^="page-"]').forEach(s=>s.classList.add('hidden'));
  document.getElementById('page-'+page)?.classList.remove('hidden');
  document.getElementById('page-home')?.classList.add('hidden');
  if(page==='home'){
    document.getElementById('page-home').classList.remove('hidden');
    return;
  }
  const pageId = page;
  const tabDefault = 'alphabet';
  switchTab(pageId.replace(/-/g,'-'), tabDefault);
  // Set dir
  const el = document.getElementById('page-'+page);
  if(page==='zh-arab'||page==='arab-cyr') el.dir='rtl';
  else el.dir='ltr';
  updateGreeting(page);
}

function switchTab(pageId, tab){
  const page = document.getElementById('page-'+pageId);
  if(!page) return;
  // Hide all child sections
  var childSections = page.querySelectorAll('.section');
  childSections.forEach(function(s){s.classList.add('hidden');});
  // Show target
  const target = document.getElementById(pageId+'-'+tab);
  if(target) target.classList.remove('hidden');
  // Update tab bar buttons
  page.querySelectorAll('.tab-bar button').forEach(function(b){
    b.classList.toggle('active', b.dataset.tab===tab);
  });
  // Render content
  if(tab==='alphabet') renderAlphabet(pageId);
  else if(tab==='translit') renderTranslit(pageId);
  else if(tab==='practice') renderPractice(pageId);
  else if(tab==='plan') renderPlan(pageId);
  else if(tab==='phrases') renderPhrases(pageId);
}

function updateGreeting(page){
  const h = document.getElementById('greetingText');
  const now = new Date();
  const hour = now.getHours();
  let timeWord = '🌅 早上好';
  if(hour>=12&&hour<14) timeWord='☀️ 中午好';
  else if(hour>=14&&hour<18) timeWord='🌤️ 下午好';
  else if(hour>=18) timeWord='🌙 晚上好';
  const names = {
    'zh-cyrillic':'🇨🇳 汉语→西里尔哈萨克文',
    'arabic-cyrillic':'🇰🇿 老哈文→西里尔',
    'zh-arabic':'🇨🇳 汉语→老哈文',
    'cyrillic-latin':'🇰🇿 西里尔→拉丁'
  };
  h.textContent = timeWord+' · '+(names[page]||'哈萨克语学习');
}

const TRANSLIT_MODES = [
  {id:'zh-cyr',label:'拼音→西里尔',src:'pinyin',dst:'cyrillic'},
  {id:'arab-cyr',label:'老哈文→西里尔',src:'arabic',dst:'cyrillic'},
  {id:'zh-arab',label:'拼音→老哈文',src:'pinyin',dst:'arabic'},
  {id:'cyr-lat',label:'西里尔→拉丁',src:'cyrillic',dst:'latin'}
];

// Simple transliteration maps
const PINYIN_CYR = {
  'a':'а','ā':'а','á':'а','ǎ':'а','à':'а',
  'b':'б','c':'ц','ch':'ч','d':'д','e':'е','ē':'е','é':'е','ě':'е','è':'е',
  'f':'ф','g':'г','h':'х','i':'и','ī':'и','í':'и','ǐ':'и','ì':'и',
  'j':'ж','k':'к','l':'л','m':'м','n':'н','o':'о','ō':'о','ó':'о','ǒ':'о','ò':'о',
  'p':'п','q':'к','r':'р','s':'с','sh':'ш','t':'т','u':'у','ū':'у','ú':'у','ǔ':'у','ù':'у',
  'v':'в','w':'у','x':'с','y':'й','z':'з','zh':'ж',
  'ai':'ай','ao':'ау','an':'ан','ang':'аң','ei':'ей','en':'ен','eng':'ең',
  'iu':'иу','ie':'ие','in':'ин','ing':'иң',
  'ou':'оу','ong':'оң',
  'ua':'уа','ue':'уе','ui':'уй','un':'ұн','uo':'уо',
  'ü':'ү','üe':'үе','üan':'үан','ün':'үн'
};
function pinyin2Cyr(text){
  let r='';
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(PINYIN_CYR[c]) r+=PINYIN_CYR[c];
    else if(/[a-zA-Z]/.test(c)) r+=c;
    else r+=c;
  }
  return r;
}

const ARABIC_CYR_MAP = {};
// Map from Arabic to Cyrillic (basic)
function arabic2Cyr(text){
  const m={'ا':'а','ب':'б','ۆ':'в','گ':'г','ع':'ғ','د':'د','ە':'е','ج':'ж','ز':'ز',
    'ي':'й','ى':'ы','ك':'ك','ق':'ق','ل':'ل','م':'م','ن':'ن','ڭ':'ң',
    'و':'о','پ':'پ','ر':'ر','س':'س','ت':'ت','ش':'ش','ۇ':'ұ','ءۇ':'ү',
    'ح':'х','ھ':'ھ','ف':'ف','ٵ':'а','ٶ':'ә','ءو':'ө','ءى':'і'};
  let r='';
  for(let c of text){
    if(m[c]) r+=m[c];
    else r+=c;
  }
  return r;
}

function cyr2Latin(text){
  const m={'а':'a','ә':'ä','б':'b','в':'v','г':'g','ғ':'ğ','д':'d','е':'e',
    'ё':'ë','ж':'j','з':'z','и':'i','й':'ı','к':'k','қ':'q','л':'l','м':'m',
    'н':'n','ң':'ñ','о':'o','ө':'ö','п':'p','р':'r','с':'s','т':'t','у':'y',
    'ұ':'ū','ү':'ü','ф':'f','х':'h','һ':'h','ц':'ts','ч':'ch','ш':'ş','щ':'şş',
    'ъ':'','ы':'y','і':'i','ь':'','э':'è','ю':'iu','я':'ia',
    'А':'A','Ә':'Ä','Б':'B','В':'V','Г':'G','Ғ':'Ğ','Д':'D','Е':'E',
    'Ё':'Ë','Ж':'J','З':'Z','И':'I','Й':'Y','К':'K','Қ':'Q','Л':'L','М':'M',
    'Н':'N','Ң':'Ñ','О':'O','Ө':'Ö','П':'P','Р':'R','С':'S','Т':'T','У':'Y',
    'Ұ':'Ū','Ү':'Ü','Ф':'F','Х':'X','Һ':'H','Ц':'Ts','Ч':'Ch','Ш':'Ş','Щ':'Şş',
    'Ъ':'','Ы':'Y','І':'I','Ь':'','Э':'E','Ю':'Iu','Я':'Ia'};
  let r='';
  for(let c of text){
    if(m[c]) r+=m[c];
    else r+=c;
  }
  return r;
}

let currentTranslitPage = 'zh-cyr';

function renderTranslit(prefix){
  const container = document.getElementById(prefix+'-translit');
  if(!container) return;
  currentTranslitPage = prefix;
  const mapping = {'zhcyr':'zh-cyr','arabcyr':'arab-cyr','zharab':'zh-arab','cyrlat':'cyr-lat'};

  let html = `<div class="section-title">🔄 转写工具</div>
  <div class="translit-tabs">`;
  TRANSLIT_MODES.forEach(m=>{
    html+=`<button class="${m.id===mode?'active':''}" onclick="setTranslitMode('${prefix}','${m.id}')">${m.label}</button>`;
  });
  html+=`</div>
  <div class="translit-area">
    <div class="translit-row">
      <textarea id="translitInput" placeholder="输入文字..." oninput="doTranslit('${prefix}')"></textarea>
    </div>

function setTranslitMode(prefix, mode){
  currentTranslitPage = prefix;
  translitMode = mode;
  const container = document.getElementById(prefix+'-translit');
  container.querySelectorAll('.translit-tabs button').forEach(b=>{
    b.classList.toggle('active', b.textContent.includes(TRANSLIT_MODES.find(m=>m.id===mode).label));
  });
  doTranslit(prefix);
}

function doTranslit(prefix){
  const input = document.getElementById('translitInput');
  const output = document.getElementById('translitOutput');
  const highlight = document.getElementById('translitHighlight');
  const error = document.getElementById('translitError');
  if(!input||!output) return;
  const text = input.value;
  let result='';
  let errors=[];

  if(text.trim()){
    const mapping = {'zhcyr':'zh-cyr','arabcyr':'arab-cyr','zharab':'zh-arab','cyrlat':'cyr-lat'};
    const m = mapping[prefix]||translitMode;
    if(m==='zh-cyr'||m==='zh-arab'){
      result = pinyin2Cyr(text);
    } else if(m==='arab-cyr'){
      result = arabic2Cyr(text);
    } else if(m==='cyr-lat'){
      result = cyr2Latin(text);
    }
    // Basic error detection
    if(/[а-яА-Я]/.test(text) && (m==='zh-cyr'||m==='zh-arab')){
      errors.push('检测到西里尔字母，确认输入语言正确吗？');
    }
    // Save to history
    if(result.trim()){
      state.history.unshift({src:text,dst:result,time:new Date().toLocaleString()});
      if(state.history.length>50) state.history.pop();
      saveState();
    }
  }

  if(prefix==='zharab'||prefix==='arabcyr'){
    output.dir='rtl';
    output.style.textAlign='right';
  } else {
    output.dir='ltr';
    output.style.textAlign='left';
  }

  output.value = result;

  // Highlight comparison
  if(text.trim()&&result.trim()){
    highlight.innerHTML = text.split('').map((c,i)=>{
      const r = result[i]||'';
      return `<span class="hl-pair"><span class="hl-src">${c}</span>→<span class="hl-dst">${r}</span></span>`;
    }).join(' ');
    highlight.style.display='block';
  } else {
    highlight.style.display='none';
  }

  if(errors.length){
    error.textContent = errors.join('；');
    error.style.display='block';
  } else {
    error.style.display='none';
  }
}

function copyTranslit(){
  const output = document.getElementById('translitOutput');
  if(output&&output.value){
    navigator.clipboard.writeText(output.value).then(()=>showToast('已复制！','success'));
  }
}

function clearTranslit(){
  const input = document.getElementById('translitInput');
  const output = document.getElementById('translitOutput');
  if(input) input.value='';
  if(output) output.value='';
  document.getElementById('translitHighlight').style.display='none';
  document.getElementById('translitError').style.display='none';
}

function toggleHistory(){
  const el = document.getElementById('translitHistory');
  if(!el) return;
  if(el.style.display==='block'){el.style.display='none';return;}
  const list = state.history.slice(0,20);
  el.innerHTML = list.map(h=>`<div class="h-item" onclick="restoreHistory('${h.src.replace(/'/g,"\\'")}')">
    <span>${h.src} → ${h.dst}</span>
    <small style="color:var(--text2)">${h.time||''}</small>
  </div>`).join('');
  el.style.display='block';
}

function restoreHistory(src){
  document.getElementById('translitInput').value=src;
  doTranslit(currentTranslitPage);
  document.getElementById('translitHistory').style.display='none';
}

function handleBatchFile(event,prefix){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    const text = e.target.result;
    document.getElementById('translitInput').value=text;
    doTranslit(prefix);
    const out = document.getElementById('translitOutput');
    downloadText(out.value, file.name.replace('.txt','_translit.txt'));
    showToast('批量转写完成并下载！','success');
  };
  reader.readAsText(file);
}

function handleBatchDrop(event,prefix){
  event.preventDefault();
  event.target.classList.remove('dragover');
  const file = event.dataTransfer.files[0];
  if(!file||!file.name.endsWith('.txt')) return;
  const reader = new FileReader();
  reader.onload = function(e){
    document.getElementById('translitInput').value=e.target.result;
    doTranslit(prefix);
    const out = document.getElementById('translitOutput');
    downloadText(out.value, file.name.replace('.txt','_translit.txt'));
    showToast('批量转写完成！','success');
  };
  reader.readAsText(file);
}

function downloadText(text, filename){
  const blob = new Blob([text],{type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function startPractice(prefix, type){
  const mapping = {'zhcyr':'zh-cyr','arabcyr':'arab-cyr','zharab':'zh-arab','cyrlat':'cyr-lat'};
  const modeKey = mapping[prefix]||'zh-cyr';
  practiceMode = prefix;

  // Filter questions
  let questions = PRACTICE_QUESTIONS.filter(q=>{
    if(type!=='all'&&q.type!==type) return false;
    return q.page.some(p=>p===modeKey);
  });
  if(questions.length<5) questions = PRACTICE_QUESTIONS.filter(q=>q.page.some(p=>p===modeKey));
  // Shuffle
  questions = shuffle(questions).slice(0,10);

  showPracticeQ();
}

    html+=`<span class="dot ${i<practiceIdx?'done':''} ${i===practiceIdx?'current':''}"></span>`;
  }
  html+=`</div>
  <div class="q-text">${q.q}</div>`;

  if(q.type==='match'||q.type==='scene'){
    html+=`<div class="options">`;
    q.options.forEach((opt,i)=>{
      html+=`<button onclick="checkPractice(${i})">${opt}</button>`;
    });
    html+=`</div>`;
  } else if(q.type==='fill'){
    html+=`<div class="fill-input">
      <input type="text" id="fillAnswer" placeholder="输入答案..." onkeydown="if(event.key==='Enter')checkFill()" autocomplete="off">
      <button onclick="checkFill()">✓ 确认</button>
    </div>`;
  }
  html+=`<div id="practiceFeedback" style="margin-top:12px;min-height:30px"></div>`;
  area.innerHTML = html;

  if(q.type==='match'||q.type==='scene'){
    area.querySelectorAll('.options button').forEach(b=>{
      b.addEventListener('click',()=>{
        area.querySelectorAll('.options button').forEach(bb=>bb.style.pointerEvents='none');
      },{once:true});
    });
  }
}

function checkPractice(idx){
  const q = practiceQ[practiceIdx];
  const feed = document.getElementById('practiceFeedback');
  const btns = document.querySelectorAll('.options button');
  const correct = idx===q.answer;
  if(correct){
    practiceScore++;
    btns[idx].classList.add('correct');
    feed.innerHTML = `<div class="result" style="color:var(--green)">✅ 正确！</div>`;
    // Remove from error book if correct 3 times
    if(state.errorBook[q.q]){
      state.errorBook[q.q] = (state.errorBook[q.q]||0)+1;
      if(state.errorBook[q.q]>=3) delete state.errorBook[q.q];
      saveState();
    }
  } else {
    btns[idx].classList.add('wrong');
    btns[q.answer].classList.add('correct');
    // Add to error book
    state.errorBook[q.q] = (state.errorBook[q.q]||0)+1;
    saveState();
    feed.innerHTML = `<div class="result" style="color:var(--accent)">❌ 错误! 正确答案是: ${q.options[q.answer]}</div>`;
  }
  btns.forEach(b=>b.style.pointerEvents='none');
  setTimeout(()=>{
    practiceIdx++;
    showPracticeQ();
  },1500);
}

function checkFill(){
  const input = document.getElementById('fillAnswer');
  const q = practiceQ[practiceIdx];
  if(!input) return;
  const ans = input.value.trim().toLowerCase();
  const correct = ans===q.answer.toLowerCase()||(q.altAnswers&&q.altAnswers.some(a=>a.toLowerCase()===ans));
  const feed = document.getElementById('practiceFeedback');
  if(correct){
    practiceScore++;
    feed.innerHTML = `<div class="result" style="color:var(--green)">✅ 正确！</div>`;
  } else {
    state.errorBook[q.q] = (state.errorBook[q.q]||0)+1;
    saveState();
    feed.innerHTML = `<div class="result" style="color:var(--accent)">❌ 错误! 正确答案是: ${q.answer}</div>`;
  }
  input.disabled=true;
  setTimeout(()=>{
    practiceIdx++;
    showPracticeQ();
  },1500);
}

function renderPracticeResult(){
  const area = document.getElementById('practiceArea');
  const pct = Math.round((practiceScore/practiceTotal)*100);
  const passed = pct>=70;
  area.innerHTML = `<div style="padding:24px;text-align:center">
    <div style="font-size:3em;margin-bottom:12px">${passed?'🎉':'💪'}</div>
    <div style="font-size:1.4em;font-weight:700;margin-bottom:8px">${passed?'太棒了！':'继续加油！'}</div>
    <div style="font-size:1.1em">得分: ${practiceScore}/${practiceTotal} (${pct}%)</div>
    ${passed?'<div style="margin-top:12px;color:var(--green)">✅ 合格！可以继续下一关</div>'
      :'<div style="margin-top:12px;color:var(--orange)">⚠ 建议复习后重试</div>'}
    <button class="home-btn" style="background:var(--primary);color:#fff;height:50px;margin:16px auto" onclick="renderPractice(practiceMode)">🔄 返回练习菜单</button>
  </div>`;
  // Check achievement
  checkAchievements();
  updateErrorBook();
}

/* =====================================================================
   DICTATION
   ===================================================================== */
// Simple speech synth for Kazakh approximations
const DICTATION_WORDS = [
  {word:'Ана',zh:'妈妈'},{word:'Ата',zh:'爸爸'},{word:'Алма',zh:'苹果'},
  {word:'Бала',zh:'孩子'},{word:'Кітап',zh:'书'},{word:'Гүл',zh:'花'},
  {word:'Су',zh:'水'},{word:'Нан',zh:'面包'},{word:'Үй',zh:'家'},
  {word:'Күн',zh:'太阳'},{word:'Жол',zh:'路'},{word:'Тау',zh:'山'}
];
let dictationWords = [];
let dictIdx = 0;

function startDictation(prefix){
  dictationMode = prefix;
  dictationWords = shuffle([...DICTATION_WORDS]).slice(0,6);
  dictIdx = 0;
  document.getElementById('practiceArea').innerHTML = renderDictationQ();
}

function renderDictationQ(){
  if(dictIdx>=dictationWords.length){
    return `<div style="text-align:center;padding:20px">
      <div style="font-size:2em">🎧 听写完成！</div>
      <button class="home-btn" style="background:var(--primary);color:#fff;height:50px;margin:16px auto" onclick="renderPractice(practiceMode)">返回</button>
    </div>`;
  }
  const w = dictationWords[dictIdx];
  return `<div class="dictation-area">
    <div class="dict-play" onclick="playDictation('${w.word}')">🔊</div>
    <div style="color:var(--text2);font-size:.85em;margin-bottom:8px">点击喇叭听发音，然后输入字母</div>
    <div class="dict-input">
      <input type="text" id="dictAnswer" placeholder="输入..." autocomplete="off" onkeydown="if(event.key==='Enter')checkDict('${w.word}')">
      <button onclick="checkDict('${w.word}')">✓</button>
    </div>
    <div id="dictFeedback" style="margin-top:8px;min-height:24px"></div>
  </div>`;
}

function playDictation(word){
  const utterance = new SpeechSynthesisUtterance(word);
  utterance.lang = 'kk-KZ';
  utterance.rate = 0.8;
  speechSynthesis.speak(utterance);
}

function checkDict(correctWord){
  const input = document.getElementById('dictAnswer');
  const ans = input.value.trim();
  const feed = document.getElementById('dictFeedback');
  if(ans.toLowerCase()===correctWord.toLowerCase()){
    practiceScore++;
    feed.innerHTML = `<span style="color:var(--green);font-weight:700">✅ 正确！</span>`;
  } else {
    feed.innerHTML = `<span style="color:var(--accent);font-weight:700">❌ 应该是: ${correctWord}</span>`;
    state.errorBook[correctWord] = (state.errorBook[correctWord]||0)+1;
    saveState();
  }
  input.disabled=true;
  setTimeout(()=>{
    dictIdx++;
    document.getElementById('practiceArea').innerHTML = renderDictationQ();
  },1500);
}

/* =====================================================================
   ERROR BOOK
   ===================================================================== */
function updateErrorBook(){
  const el = document.getElementById('errorBook');
  if(el) el.innerHTML = renderErrorBook();
}

function renderErrorBook(){
  const entries = Object.entries(state.errorBook||{});
  if(!entries.length) return '<div style="color:var(--text2);padding:12px;text-align:center">✨ 没有错题，继续保持！</div>';
  return entries.map(([q,count])=>{
    const remaining = Math.max(0,3-count);
    return `<div class="e-item">
      <span>❌ ${q}</span>
      <span class="e-count">${remaining}</span>
    </div>`;
  }).join('');
}

/* =====================================================================
   ACHIEVEMENTS
   ===================================================================== */
const ACHIEVEMENTS = [
  {id:'first_letter',name:'初识字母',emoji:'🔤',desc:'完成第一次字母学习',check:()=>Object.keys(state.plan||{}).length>0},
  {id:'practice_master',name:'练习达人',emoji:'📝',desc:'完成练习得分≥70%',check:()=>practiceScore>0},
  {id:'day_3',name:'坚持3天',emoji:'🔥',desc:'完成3天学习计划',check:()=>(state.completedDays||[]).length>=3},
  {id:'day_7',name:'一周打卡',emoji:'📅',desc:'完成7天学习计划',check:()=>(state.completedDays||[]).length>=7},
  {id:'day_8',name:'毕业了！',emoji:'🎓',desc:'完成全部8天学习',check:()=>(state.completedDays||[]).length>=8},
  {id:'word_master',name:'词汇大师',emoji:'📚',desc:'收藏5个以上词汇',check:()=>Object.keys(state.favorites||{}).length>=5},
  {id:'translator',name:'转写达人',emoji:'🔄',desc:'使用转写工具10次以上',check:()=>state.history&&state.history.length>=10},
  {id:'error_clean',name:'错题清空',emoji:'🧹',desc:'错题本全部清空',check:()=>Object.keys(state.errorBook||{}).length===0&&(state.completedDays||[]).length>0}
];

function checkAchievements(){
  const unlocked = new Set(state.completedDays||[]);
  ACHIEVEMENTS.forEach(a=>{
    if(!unlocked.has(a.id)&&a.check()){
      unlocked.add(a.id);
      state.completedDays = [...unlocked];
      saveState();
      showToast(`🏆 解锁成就: ${a.name}!`,'success');
    }
  });
}

function renderAchievements(){
  const unlocked = new Set(state.completedDays||[]);
  return ACHIEVEMENTS.map(a=>{
    const got = unlocked.has(a.id);
    return `<div class="achieve-item ${got?'unlocked':''}">
      <span class="ach-emoji">${a.emoji}</span>
      <span>${a.name}</span>
    </div>`;
  }).join('');
}

/* =====================================================================
   LEARNING PLAN
   ===================================================================== */
function renderPlan(prefix){
  const container = document.getElementById(prefix+'-plan');
  if(!container) return;

  // Determine which day user is on
  const completed = new Set(state.completedDays||[]);
  let currentDay = 1;
  for(let i=1;i<=8;i++){
    if(!completed.has('day_'+i)){currentDay=i;break;}
  }

  let html = `<div class="section-title">📅 学习计划 (8天掌握)</div>`;
  // Daily quote
  const dayData = LEARNING_PLAN[currentDay-1];
  if(dayData){
    html+=`<div class="day-quote">
      <div class="dq-text">💬 ${dayData.quote.text}</div>
      <div class="dq-trans">${dayData.quote.trans} — ${dayData.quote.scene}</div>
    </div>`;
  }

  // Day task card
  html+=`<div class="card glass" style="text-align:center;margin:16px 0">
    <div style="font-size:1.8em;font-weight:800;color:var(--primary)">第 ${currentDay} 天</div>
    <div style="font-weight:600;margin:8px 0">${dayData?.title||''}</div>
    <div style="font-size:.9em;color:var(--text2);margin-bottom:12px">${dayData?.task||''}</div>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">`;
  if(dayData?.items){
    dayData.items.forEach(l=>{
      html+=`<span class="badge" style="background:var(--glass)">${l}</span>`;
    });
  }
  html+=`</div>
    <div style="margin-top:16px;display:flex;gap:10px;justify-content:center">
      <button onclick="completeDay('${prefix}')" style="background:var(--green);color:#fff;padding:12px 24px">✓ 完成今日学习</button>
    </div>
  </div>`;

  // Overall progress
  const pct = Math.round((completed.size/8)*100);
  html+=`<div style="background:var(--glass);border-radius:var(--radius);padding:16px;margin:12px 0">
    <div style="display:flex;justify-content:space-between;font-size:.85em;margin-bottom:6px">
      <span>总进度</span><span>${completed.size}/8 天</span>
    </div>
    <div style="height:8px;background:var(--glass-border);border-radius:4px;overflow:hidden">
      <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--green),var(--primary));border-radius:4px;transition:width .5s"></div>
    </div>
  </div>`;

  // All days grid
  html+=`<div class="plan-grid">`;
  LEARNING_PLAN.forEach((d,i)=>{
    const dayKey = 'day_'+(i+1);
    const isComplete = completed.has(dayKey);
    const isCurrent = (i+1)===currentDay;
    html+=`<div class="plan-day ${isComplete?'completed':''} ${isCurrent?'current':''}">
      <div class="day-num">${isComplete?'✅':(i+1)}</div>
      <div class="day-title">${d.title}</div>
      <div class="day-task">${d.task}</div>
    </div>`;
  });
  html+=`</div>`;

  container.innerHTML = html;
}

function completeDay(prefix){
  const completed = new Set(state.completedDays||[]);
  let currentDay = 1;
  for(let i=1;i<=8;i++){
    if(!completed.has('day_'+i)){currentDay=i;break;}
  }
  const dayKey = 'day_'+currentDay;
  if(!completed.has(dayKey)){
    completed.add(dayKey);
    state.completedDays = [...completed];
    saveState();
    checkAchievements();
    showToast(`🎉 第 ${currentDay} 天完成！`,'success');
    renderPlan(prefix);
  }
}

/* =====================================================================
   PHRASES
   ===================================================================== */
let phraseCat = 0;

function renderPhrases(prefix){
  const container = document.getElementById(prefix+'-phrases');
  if(!container) return;

  let html = `<div class="section-title">💬 常用语库</div>
  <div class="phrase-cats">`;
  PHRASE_CATEGORIES.forEach((cat,i)=>{
    html+=`<button class="${i===phraseCat?'active':''}" onclick="switchPhraseCat(${i},'${prefix}')">${cat.name}</button>`;
  });
  html+=`</div>
  <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
    <input type="text" id="phraseSearch" placeholder="搜索词汇..." style="flex:1;min-width:100px" oninput="filterPhrases('${prefix}')">
    <button class="export-btn" onclick="exportPhrases()">📥 导出TXT</button>
  </div>
  <div class="phrase-list" id="phraseList">`;
  html+=renderPhraseList(prefix, phraseCat, '');
  html+=`</div>`;
  container.innerHTML = html;
}

function renderPhraseList(prefix, catIdx, search){
  const catId = PHRASE_CATEGORIES[catIdx].id;
  let items = PHRASES[catId]||[];
  const isRTL = prefix==='zharab'||prefix==='arabcyr';
  if(search){
    const s = search.toLowerCase();
    items = items.filter(i=>i.kk.toLowerCase().includes(s)||i.zh.includes(s));
  }
  return items.map(item=>{
    const favKey = catId+':'+item.kk;
    const isFav = state.favorites[favKey];
    return `<div class="phrase-item" ${isRTL?'dir="rtl"':''}>
      <div>
        <div class="kk-text">${item.kk}</div>
        <div class="zh-text">${item.zh}</div>
      </div>
      <button class="fav-btn ${isFav?'active':''}" onclick="toggleFav('${catId}','${item.kk}','${item.zh}')">${isFav?'★':'☆'}</button>
    </div>`;
  }).join('');
}

function switchPhraseCat(idx, prefix){
  phraseCat = idx;
  renderPhrases(prefix);
}

function filterPhrases(prefix){
  const search = document.getElementById('phraseSearch').value;
  const list = document.getElementById('phraseList');
  if(list){
    list.innerHTML = renderPhraseList(prefix, phraseCat, search);
  }
}

function toggleFav(catId, kk, zh){
  const key = catId+':'+kk;
  if(state.favorites[key]){
    delete state.favorites[key];
    showToast('已取消收藏','info');
  } else {
    state.favorites[key] = {kk,zh,cat:catId};
    showToast('⭐ 已收藏','success');
  }
  saveState();
  // Re-render
  const list = document.getElementById('phraseList');
  const search = document.getElementById('phraseSearch')?.value||'';
  const prefix = list?.closest('.section')?.id?.replace(/-.*/,'')||'zhcyr';
  if(list) list.innerHTML = renderPhraseList(prefix, phraseCat, search);
  checkAchievements();
}

function exportPhrases(){
  let text = '=== 哈萨克语常用语 ===\n\n';
  PHRASE_CATEGORIES.forEach(cat=>{
    text+=`\n【${cat.name}】\n${'='.repeat(20)}\n`;
    (PHRASES[cat.id]||[]).forEach(p=>{
      text+=`${p.kk} — ${p.zh}\n`;
    });
  });
  // Favorites
  const favs = Object.values(state.favorites||{});
  if(favs.length){
    text+=`\n\n=== ⭐ 收藏词汇 (${favs.length}个) ===\n${'='.repeat(30)}\n`;
    favs.forEach(f=>text+=`${f.kk} — ${f.zh}\n`);
  }
  downloadText(text, 'kazakh_phrases.txt');
  showToast('📥 导出成功！','success');
}

/* =====================================================================
   THEME & FONT
   ===================================================================== */
function toggleTheme(){
  // theme switching removed — design is now a warm Kazakh palette
  return;
}

function cycleFontSize(){
  const sizes = ['font-sm','','font-lg'];
  const current = document.body.className.match(/font-(sm|lg)/);
  let idx = 0;
  if(current){
    document.body.classList.remove(current[0]);
    idx = sizes.indexOf(current[0]);
  }
  idx = (idx+1)%sizes.length;
  if(sizes[idx]) document.body.classList.add(sizes[idx]);
  state.fontSize = idx;
  document.getElementById('fontBtn').textContent = idx===0?'A⁻':(idx===1?'A':'A⁺');
  saveState();
}

/* =====================================================================
   GLOBAL SEARCH
   ===================================================================== */
function doGlobalSearch(q){
  if(!q.trim()){
    document.querySelectorAll('.letter-card').forEach(c=>c.style.display='');
    return;
  }
  const s = q.toLowerCase().trim();
  // Search through alphabet
  const allLetters = document.querySelectorAll('.letter-card');
  allLetters.forEach(c=>{
    const text = c.textContent.toLowerCase();
    c.style.display = text.includes(s)?'':'none';
  });
}

/* =====================================================================
   UTILITY
   ===================================================================== */
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function showToast(msg, type='info'){
  const container = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast '+type;
  t.textContent = msg;
  container.appendChild(t);
  setTimeout(()=>{t.remove()},3000);
}

/* =====================================================================
   INIT
   ===================================================================== */
function init(){
  // Theme is now fixed warm palette — no toggle needed
  // Apply font size
  const sizes = ['font-sm','','font-lg'];
  if(sizes[state.fontSize]) document.body.classList.add(sizes[state.fontSize]);
  document.getElementById('fontBtn').textContent = state.fontSize===0?'A⁻':(state.fontSize===1?'A':'A⁺');
  
  // Show home
  document.getElementById('page-home').classList.remove('hidden');

  // Update greeting
  const h = document.getElementById('greetingText');
  const hour = new Date().getHours();
  let g = '🌅 早上好！';
  if(hour>=12&&hour<14) g='☀️ 中午好！';
  else if(hour>=14&&hour<18) g='🌤️ 下午好！';
  else if(hour>=18) g='🌙 晚上好！';
  h.textContent = g+' 今天学哈萨克语吧';

  // PWA service worker registration
  if('serviceWorker' in navigator){
    // For GitHub Pages, skip SW registration
  }

  console.log('🥟 QazaqTanu initialized');
}

// Start when DOM ready
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
