<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Qazaq Álipbii · 哈萨克字母学习</title>
<meta name="description" content="哈萨克字母学习 - 西里尔文、拉丁文、老哈文互学工具">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="manifest.json">
<style>
:root{--bg:linear-gradient(135deg,#1a1a2e 0%,#16213e 30%,#0f3460 70%,#1a1a2e 100%);--card-bg:rgba(255,255,255,0.06);--card-hover:rgba(255,255,255,0.1);--text:#fff;--text-sec:rgba(255,255,255,0.55);--text-muted:rgba(255,255,255,0.3);--border:rgba(255,255,255,0.07);--shadow:0 8px 32px rgba(0,0,0,0.4);--accent:#e91e63;--accent2:#2196f3;--accent3:#4caf50;--accent4:#ffc107;--radius:14px;--font:'Noto Sans','Arial',sans-serif}
[data-theme="light"]{--bg:linear-gradient(135deg,#fce4ec 0%,#f3e5f5 30%,#e8eaf6 70%,#e0f7fa 100%);--card-bg:rgba(255,255,255,0.65);--card-hover:rgba(255,255,255,0.85);--text:#2d2d2d;--text-sec:#666;--text-muted:#aaa;--border:rgba(0,0,0,0.06);--shadow:0 4px 20px rgba(0,0,0,0.07);--accent:#c2185b;--accent2:#1565c0;--accent3:#2e7d32;--accent4:#f57f17}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;color:var(--text);transition:all .3s}
.welcome{max-width:640px;width:100%;text-align:center}
.logo{font-size:48px;margin-bottom:4px}
h1{font-size:32px;font-weight:900;letter-spacing:-.5px;margin-bottom:4px}
h1 span{background:linear-gradient(135deg,var(--accent),#9c27b0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{font-size:14px;color:var(--text-sec);margin-bottom:6px;direction:rtl}
.tag{font-size:12px;color:var(--text-muted);margin-bottom:24px;letter-spacing:1px}
.q{font-size:17px;font-weight:700;margin-bottom:16px;color:var(--text)}
.cards{display:flex;flex-direction:column;gap:10px}
.card{background:var(--card-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);text-align:left;display:flex;align-items:center;gap:14px;text-decoration:none;color:var(--text)}
.card:hover{background:var(--card-hover);transform:translateX(6px);box-shadow:var(--shadow)}
.card:active{transform:scale(.97)}
.card .c-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.card .c-body{flex:1;min-width:0}
.card .c-body h3{font-size:15px;font-weight:700;line-height:1.3}
.card .c-body p{font-size:12px;color:var(--text-sec);margin-top:2px;line-height:1.3}
.card .c-arrow{font-size:16px;opacity:0;transition:all .3s;color:var(--text-muted)}
.card:hover .c-arrow{opacity:1;transform:translateX(4px)}
.type1 .c-icon{background:linear-gradient(135deg,var(--accent),#c2185b)}
.type2 .c-icon{background:linear-gradient(135deg,var(--accent2),#1565c0);font-family:'Noto Naskh Arabic',serif;font-size:18px}
.type3 .c-icon{background:linear-gradient(135deg,var(--accent3),#2e7d32)}
.type4 .c-icon{background:linear-gradient(135deg,var(--accent4),#f57f17)}
.reset-btn{background:none;border:1px solid var(--border);border-radius:10px;padding:8px 16px;color:var(--text-muted);font-size:12px;cursor:pointer;margin-top:20px;transition:all .2s;font-family:var(--font)}
.reset-btn:hover{background:var(--card-bg);border-color:var(--accent);color:var(--accent)}
.footer{color:var(--text-muted);font-size:11px;margin-top:18px;opacity:.5}
.theme-btn{position:fixed;top:16px;right:16px;width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--card-bg);backdrop-filter:blur(8px);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text);transition:all .2s;z-index:10}
.theme-btn:hover{background:var(--card-hover);transform:rotate(20deg)}
@media(max-width:500px){.welcome{max-width:100%}.logo{font-size:36px}h1{font-size:24px}.card{padding:14px}.card .c-icon{width:38px;height:38px;font-size:17px}}
</style>
</head>
<body>
<button class="theme-btn" id="themeBtn" onclick="toggleTheme()">☀️</button>
<div class="welcome" id="welcomeScreen">
  <div class="logo">📖</div>
  <h1><span>Qazaq Álipbii</span></h1>
  <p class="sub">قازاق ٵلىپبئى</p>
  <p class="tag">✦ 字母学习平台 ✦</p>
  <p class="q">Сіз кімсіз? · 您是哪类学习者？</p>
  <div class="cards">
    <a class="card type1" href="cyrillic.html?type=1">
      <div class="c-icon">🀄</div>
      <div class="c-body">
        <h3>汉语 → 西里尔文</h3>
        <p>会普通话，想学习哈萨克西里尔字母 · Қытай тілінен Кирилге</p>
      </div>
      <span class="c-arrow">→</span>
    </a>
    <a class="card type2" href="arabic-to-cyrillic.html?type=2">
      <div class="c-icon">ع</div>
      <div class="c-body">
        <h3 style="direction:rtl">قازاقشا → كيريل</h3>
        <p>会老哈文（阿拉伯哈文），想学西里尔文 · كونە جازۋدان كيريلگە</p>
      </div>
      <span class="c-arrow">→</span>
    </a>
    <a class="card type3" href="learn-kazakh.html?type=3">
      <div class="c-icon">🌏</div>
      <div class="c-body">
        <h3>汉语 → 老哈文</h3>
        <p>会普通话，想学习老哈文（阿拉伯字母）</p>
      </div>
      <span class="c-arrow">→</span>
    </a>
    <a class="card type4" href="latin.html?type=4">
      <div class="c-icon">📝</div>
      <div class="c-body">
        <h3>Кирил → Latin</h3>
        <p>会西里尔文，想学习拉丁字母 · كيريلدەن لاتىنعا</p>
      </div>
      <span class="c-arrow">→</span>
    </a>
  </div>
  <button class="reset-btn" onclick="resetType()">↺ 重新选择</button>
  <div class="footer">🌸 Бауырсақ · 2026</div>
</div>

<script>
function initTheme(){
  var s=localStorage.getItem('kazakhTheme')||'dark';
  document.documentElement.setAttribute('data-theme',s);
  var b=document.getElementById('themeBtn');
  if(b)b.textContent=s==='light'?'🌙':'☀️';
}
function toggleTheme(){
  var c=document.documentElement.getAttribute('data-theme');
  var n=c==='light'?'dark':'light';
  document.documentElement.setAttribute('data-theme',n);
  localStorage.setItem('kazakhTheme',n);
  var b=document.getElementById('themeBtn');
  if(b)b.textContent=n==='light'?'🌙':'☀️';
}
function resetType(){
  localStorage.removeItem('kazakhUserType');
  localStorage.removeItem('kazakhProgress');
  localStorage.removeItem('kazakhQuizScore');
  document.querySelectorAll('.card').forEach(function(c){c.style.opacity=1;c.style.pointerEvents='auto'});
}
document.querySelectorAll('.card').forEach(function(c){
  c.addEventListener('click',function(){
    var t=this.getAttribute('href').match(/type=(\d)/);
    if(t)localStorage.setItem('kazakhUserType',t[1]);
  });
});
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js');
initTheme();
</script>
</body>
</html>
