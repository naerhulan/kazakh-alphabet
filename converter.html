<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Qazaq Conv - قازاقشا اۋدارۋ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Noto Sans SC',sans-serif;background:linear-gradient(135deg,#f8f9ff,#fce4ec);min-height:100vh;padding:16px}
.app{max-width:520px;margin:0 auto}
.header{background:linear-gradient(135deg,#667eea,#764ba2);border-radius:16px;padding:18px 20px;color:#fff;margin-bottom:12px}
.header h1{font-size:20px;font-weight:700}
.header p{font-size:11px;opacity:.7;margin-top:3px}
.conv-box{background:#fff;border-radius:14px;padding:16px;box-shadow:0 4px 20px rgba(0,0,0,.06);margin-bottom:10px}
.dir-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.dir-row .lbl{font-size:12px;font-weight:600;color:#666}
.dir-btn{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:50%;width:32px;height:32px;font-size:16px;cursor:pointer;box-shadow:0 3px 10px rgba(102,126,234,.3)}
textarea{width:100%;min-height:90px;padding:12px;border:2px solid #e8eaf6;border-radius:10px;font-size:16px;font-family:'Noto Naskh Arabic',serif;outline:none;resize:vertical;line-height:1.7;transition:border .2s}
textarea:focus{border-color:#667eea}
textarea.cyr{direction:ltr;font-family:-apple-system,sans-serif}
.result{width:100%;min-height:70px;padding:12px;border:2px solid #e8eaf6;border-radius:10px;font-size:16px;font-family:'Noto Naskh Arabic',serif;background:#f8f9ff;margin-top:8px;line-height:1.7;word-break:break-word}
.result.cyr{direction:ltr;font-family:-apple-system,sans-serif}
.btn-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.btn{padding:9px 16px;border:none;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-pri{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;flex:1}
.btn-sec{background:rgba(102,126,234,.1);color:#667eea}
.btn-pink{background:linear-gradient(135deg,#f093fb,#f5576c);color:#fff}
.btn-red{background:rgba(245,87,108,.1);color:#f5576c}
.btn-gry{background:rgba(0,0,0,.04);color:#999}
.his-box{background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 4px 20px rgba(0,0,0,.06)}
.his-box h3{font-size:13px;color:#666;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.his-item{padding:8px 0;border-bottom:1px solid #f3f3f3;font-size:13px;line-height:1.5}
.his-item:last-child{border-bottom:none}
.his-src{color:#333}
.his-dst{color:#667eea;margin-top:1px}
.his-time{font-size:10px;color:#ccc}
.empty-his{text-align:center;color:#ccc;padding:16px;font-size:13px}
.let-box{background:#fff;border-radius:14px;padding:12px 16px;margin-top:10px}
.let-box h3{font-size:12px;color:#666;margin-bottom:8px}
.let-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(46px,1fr));gap:5px}
.let-card{background:#fff;border-radius:8px;padding:6px 3px;text-align:center;border:1.5px solid #e8eaf6;cursor:pointer;transition:all .15s;font-size:17px;font-weight:700;color:#333}
.let-card:active{border-color:#667eea;transform:scale(.95)}
.let-card .sub{display:block;font-size:8px;color:#999;font-weight:400;margin-top:1px}
.footer{text-align:center;font-size:10px;color:#ccc;margin-top:16px}
</style>
</head>
<body>
<div class="app">

<div class="header">
<h1>🇰🇿 Qazaq Conv</h1>
<p>قازاقشا اۋدارۋ · 哈萨克文字转换</p>
</div>

<div class="conv-box">
<div class="dir-row">
<span class="lbl" id="dirLabel">قازاقشا → كيريل</span>
<button class="dir-btn" onclick="swDir()">⇄</button>
</div>
<textarea id="inp" placeholder="جازۋ جازىڭىز ..."></textarea>
<div class="result" id="out"></div>
<div class="btn-row">
<button class="btn btn-pri" onclick="conv()">🔄 اۋدار</button>
<button class="btn btn-pink" onclick="spkInp()">🔊 وقۋ</button>
<button class="btn btn-gry" onclick="clr()">✕</button>
</div>
</div>

<div class="let-box">
<h3>🔤 اريپتەر</h3>
<div class="let-grid" id="letGrid"></div>
</div>

<div class="his-box" style="margin-top:10px">
<h3><span>📋 تارىح</span><button class="btn btn-red" style="padding:4px 10px;font-size:11px" onclick="clrHis()">تازالاۋ</button></h3>
<div id="hisList"><div class="empty-his">جازۋ جوق</div></div>
</div>

<div class="footer">🌸 Qazaq Conv · v1.0 · толىق وفسلاين</div>

</div>

<script>
// === Conversion Table ===
const c2a={'а':'ا','ә':'اە','б':'ب','в':'ۋ','г':'گ','ғ':'ع','д':'د','е':'ە','ё':'يو','ж':'ج','з':'ز','и':'ي','й':'ي','к':'ك','қ':'ق','л':'ل','м':'م','н':'ن','ң':'ڭ','о':'و','ө':'و','п':'پ','р':'ر','с':'س','т':'ت','у':'ۋ','ұ':'ۇ','ү':'ۇ','ف':'ف','х':'ح','һ':'ھ','ц':'تس','ч':'چ','ш':'ش','щ':'شش','ъ':'','ы':'ى','і':'ى','ь':'','э':'ە','ю':'يۋ','я':'يا',
'А':'ا','Ә':'اە','Б':'ب','В':'ۋ','Г':'گ','Ғ':'ع','Д':'د','Е':'ە','Ё':'يو','Ж':'ج','З':'ز','И':'ي','Й':'ي','К':'ك','Қ':'ق','Л':'ل','М':'م','Н':'ن','Ң':'ڭ','О':'و','Ө':'و','П':'پ','Р':'ر','С':'س','Т':'ت','У':'ۋ','Ұ':'ۇ','Ү':'ۇ','Ф':'ف','Х':'ح','Һ':'ھ','Ц':'تس','Ч':'چ','Ш':'ش','Щ':'شش','Ъ':'','Ы':'ى','І':'ى','Ь':'','Э':'ە','Ю':'يۋ','Я':'يا'}

const a2c={}
for(let k in c2a)a2c[c2a[k]]=k

let dir='a2c'
let his=JSON.parse(localStorage.getItem('qch')||'[]')

function init(){
  renderLet()
  renderHis()
}

function conv(){
  let s=document.getElementById('inp').value
  if(!s)return
  let r=''
  if(dir==='a2c'){
    for(let i=0;i<s.length;i++){
      let t=s[i]+(i+1<s.length?s[i+1]:'')
      if(a2c[t]){r+=a2c[t];i++}
      else if(a2c[s[i]])r+=a2c[s[i]]
      else r+=s[i]
    }
  }else{
    r=s.split('').map(c=>c2a[c]||c).join('')
  }
  document.getElementById('out').textContent=r
  his.unshift({s,dst:r,t:new Date().toLocaleString()})
  if(his.length>50)his=his.slice(0,50)
  localStorage.setItem('qch',JSON.stringify(his))
  renderHis()
}

function swDir(){
  dir=dir==='a2c'?'c2a':'a2c'
  let inp=document.getElementById('inp'),out=document.getElementById('out')
  if(dir==='a2c'){
    document.getElementById('dirLabel').textContent='قازاقشا → كيريل'
    inp.placeholder='جازۋ جازىڭىز ...'
    inp.className=''
    out.className='result cyr'
  }else{
    document.getElementById('dirLabel').textContent='Кирил → قازاقشا'
    inp.placeholder='Кирилше жазыңыз...'
    inp.className='cyr'
    out.className='result'
  }
  clr()
}

function clr(){
  document.getElementById('inp').value=''
  document.getElementById('out').textContent=''
}

function spkInp(){
  let t=document.getElementById('inp').value.trim()
  if(!t){spkOut();return}
  speechSynthesis.cancel()
  let u=new SpeechSynthesisUtterance(t)
  u.lang='kk-KZ';u.rate=.85
  speechSynthesis.speak(u)
}
function spkOut(){
  let t=document.getElementById('out').textContent
  if(!t)return
  speechSynthesis.cancel()
  let u=new SpeechSynthesisUtterance(t)
  u.lang='kk-KZ';u.rate=.85
  speechSynthesis.speak(u)
}

function spkLet(t){
  speechSynthesis.cancel()
  let u=new SpeechSynthesisUtterance(t)
  u.lang='kk-KZ';u.rate=.7
  speechSynthesis.speak(u)
}

function renderLet(){
  const ls=[['ا','А'],['اە','Ә'],['ب','Б'],['ۋ','В'],['گ','Г'],['ع','Ғ'],['د','Д'],['ە','Е'],['ج','Ж'],['ز','З'],['ي','И'],['ك','К'],['ق','Қ'],['ل','Л'],['م','М'],['ن','Н'],['ڭ','Ң'],['و','О'],['پ','П'],['ر','Р'],['س','С'],['ت','Т'],['ۇ','Ұ/Ү'],['ف','Ф'],['ح','Х'],['ھ','Һ'],['چ','Ч'],['ش','Ш'],['ى','Ы/І'],['يۋ','Ю'],['يا','Я']]
  document.getElementById('letGrid').innerHTML=ls.map(l=>`<div class="let-card" onclick="spkLet('${l[1].split('/')[0]}')"><span style="font-size:15px;font-family:'Noto Naskh Arabic',serif;display:block">${l[0]}</span><span class="sub">${l[1]}</span></div>`).join('')
}

function renderHis(){
  let el=document.getElementById('hisList')
  if(!his.length){el.innerHTML='<div class="empty-his">جازۋ جوق</div>';return}
  el.innerHTML=his.map(h=>`<div class="his-item"><div class="his-src">${h.s}</div><div class="his-dst">${h.dst}</div><div class="his-time">${h.t}</div></div>`).join('')
}

function clrHis(){
  if(!confirm('تازالاۋ?')&&his.length>0)return
  his=[]
  localStorage.setItem('qch',JSON.stringify(his))
  renderHis()
}

document.getElementById('inp').addEventListener('input',function(){if(this.value.trim())conv()})
document.getElementById('inp').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();conv()}})

init()
</script>
</body>
</html>
