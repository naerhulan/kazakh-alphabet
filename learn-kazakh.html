<!DOCTYPE html>
<html lang="zh-CN">
<head>

<link rel="manifest" href="manifest.json">
<style>
:root{--bg:linear-gradient(135deg,#1a1a2e 0%,#16213e 30%,#0f3460 70%,#1a1a2e 100%);--card:rgba(255,255,255,0.06);--card-hover:rgba(255,255,255,0.1);--card-solid:rgba(30,30,55,0.92);--text:#f0f0f0;--text-sec:rgba(255,255,255,0.55);--text-muted:rgba(255,255,255,0.3);--border:rgba(255,255,255,0.07);--shadow:0 4px 24px rgba(0,0,0,0.4);--shadow-sm:0 2px 8px rgba(0,0,0,0.3);--accent:#00897b;--accent2:#00695c;--accent3:#4db6ac;--accent4:#4caf50;--nav-bg:rgba(20,20,40,0.88);--radius-sm:8px;--radius-md:12px;--radius-lg:18px;--radius-xl:22px;--font:'Noto Sans','Arial',sans-serif;--font-zh:'Noto Sans SC','Microsoft YaHei','PingFang SC',sans-serif;--font-ab:'Noto Naskh Arabic','Traditional Arabic','Scheherazade',serif}
[data-theme="light"]{--bg:linear-gradient(135deg,#e0f7fa 0%,#fff3e0 50%,#fce4ec 100%);--card:rgba(255,255,255,0.6);--card-hover:rgba(255,255,255,0.85);--card-solid:#fff;--text:#2d2d2d;--text-sec:#666;--text-muted:#aaa;--border:rgba(0,0,0,0.06);--shadow:0 4px 20px rgba(0,0,0,0.07);--shadow-sm:0 2px 6px rgba(0,0,0,0.04);--accent:#00897b;--accent2:#00695c;--accent3:#26a69a;--accent4:#2e7d32;--nav-bg:rgba(255,255,255,0.78)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-zh);background:var(--bg);min-height:100vh;color:var(--text);transition:all .25s;overflow-x:hidden}
.top-nav{position:sticky;top:0;z-index:100;background:var(--nav-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.nav-left{display:flex;align-items:center;gap:10px}
.nav-back{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 12px;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.nav-back:hover{background:var(--card-hover);border-color:var(--accent)}
.nav-right{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.nav-btn{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 10px;font-size:11px;font-weight:600;color:var(--text);cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:4px;font-family:var(--font-zh);white-space:nowrap}
.nav-btn:hover{background:var(--card-hover);border-color:var(--accent);transform:translateY(-1px)}
.nav-btn.quiz-active{background:rgba(0,137,123,.15);border-color:var(--accent);color:var(--accent)}
.theme-toggle{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.theme-toggle:hover{background:var(--card-hover);border-color:var(--accent);transform:rotate(20deg)}
.page-wrap{max-width:880px;margin:0 auto;padding:20px 16px 60px}
.section-card{background:var(--card-solid);border-radius:var(--radius-xl);padding:28px 24px;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:16px;transition:all .25s}
.section-title{font-size:17px;font-weight:800;margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid var(--accent);display:flex;align-items:center;gap:8px;color:var(--text)}
.letter-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(82px,1fr));gap:8px;margin-bottom:8px}
.letter-card{position:relative;background:var(--card);border-radius:var(--radius-md);padding:12px 6px 8px;text-align:center;border:2px solid transparent;cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);user-select:none}
.letter-card:hover{transform:translateY(-4px);box-shadow:0 8px 20px rgba(0,0,0,.2);border-color:var(--accent)}
.letter-card:active{transform:scale(.94)}
.letter-card .ar{font-size:28px;color:#004d40;font-weight:700;direction:rtl;font-family:var(--font-ab)}
.letter-card .cyr{font-size:12px;color:var(--text-muted);margin-top:2px}
.letter-card .zh{font-size:12px;color:var(--accent);margin-top:1px;font-weight:500}
.letter-card .sound-icon{position:absolute;top:3px;left:5px;font-size:10px;opacity:.25;z-index:1}
.letter-card:hover .sound-icon{opacity:.7}
.letter-card.playing{border-color:var(--accent);box-shadow:0 0 24px rgba(0,137,123,.25);animation:pulse .4s}
.letter-card.learned{border-color:var(--accent4);background:rgba(76,175,80,.08)}
.letter-card.learned::after{content:'✓';position:absolute;top:2px;right:5px;font-size:10px;color:var(--accent4);font-weight:700;z-index:1}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
.data-table{width:100%;border-collapse:separate;border-spacing:0;overflow:hidden;border-radius:var(--radius-md);margin:8px 0;font-size:13px}
.data-table th{background:var(--accent);color:#fff;padding:8px 10px;font-size:12px;font-weight:700;text-align:left}
.data-table td{padding:7px 10px;border-bottom:1px solid var(--border);transition:background .12s;cursor:pointer}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:rgba(0,137,123,.04)}
.data-table .ar{font-size:18px;font-weight:700;color:#004d40;direction:rtl;font-family:var(--font-ab)}
.data-table .cyr{font-weight:600;color:var(--accent)}
.tip-box{background:rgba(0,137,123,.06);border-radius:var(--radius-md);padding:14px 16px;margin:12px 0;font-size:12px;line-height:1.7;color:var(--text-sec);border-left:3px solid var(--accent)}
.stats-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;font-size:12px}
.stats-item{background:var(--card);padding:6px 12px;border-radius:var(--radius-sm);display:flex;align-items:center;gap:5px;color:var(--text-sec)}
.stats-item strong{color:var(--accent)}
.search-box{display:none;margin:0 0 12px}
.search-box.show{display:block}
.search-input{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:var(--radius-md);font-size:14px;outline:none;background:var(--card);color:var(--text);font-family:var(--font-zh);transition:border .2s}
.search-input:focus{border-color:var(--accent)}

/* Quiz */
.quiz-panel{display:none;background:rgba(0,137,123,.05);border-radius:var(--radius-lg);padding:20px 18px;margin-bottom:16px;border:1px solid rgba(0,137,123,.15)}
.quiz-panel.show{display:block}
.quiz-q{font-size:34px;font-weight:700;text-align:center;margin:10px 0;color:var(--accent2)}
.quiz-qsound{text-align:center;font-size:12px;color:var(--text-muted);margin-bottom:12px}
.quiz-qsound .play-hint{display:inline-flex;align-items:center;gap:4px;cursor:pointer;color:var(--accent);font-weight:600}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.quiz-opt{background:var(--card);border:2px solid var(--border);border-radius:var(--radius-md);padding:12px 8px;font-size:20px;font-weight:600;text-align:center;cursor:pointer;transition:all .2s;color:var(--text);font-family:var(--font-zh)}
.quiz-opt:hover{border-color:var(--accent);transform:translateY(-2px)}
.quiz-opt.correct{border-color:var(--accent4);background:rgba(76,175,80,.12);color:var(--accent4)}
.quiz-opt.wrong{border-color:#f44336;background:rgba(244,67,54,.1);color:#f44336}
.quiz-score{text-align:center;font-size:13px;color:var(--text-sec);margin-top:8px}
.quiz-score strong{color:var(--accent);font-size:16px}
.quiz-next-btn{display:block;margin:8px auto 0;padding:8px 24px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;font-family:var(--font-zh)}
.quiz-next-btn:hover{transform:translateY(-2px)}
.quiz-next-btn:disabled{opacity:.4;cursor:default;transform:none}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;justify-content:center;align-items:center;padding:20px;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal-box{background:var(--card-solid);border-radius:var(--radius-xl);padding:28px 24px;max-width:380px;width:100%;box-shadow:var(--shadow);border:1px solid var(--border);max-height:80vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:800;margin-bottom:16px;text-align:center;color:var(--text)}
.modal-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-stat{background:var(--card);border-radius:var(--radius-md);padding:14px;text-align:center}
.modal-stat .val{font-size:28px;font-weight:900;color:var(--accent)}
.modal-stat .lbl{font-size:11px;color:var(--text-muted);margin-top:2px}
.modal-stat .val.green{color:var(--accent4)}
.modal-stat .val.gold{color:#ff9800}
.modal-close{display:block;margin:16px auto 0;padding:8px 28px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font-zh)}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent2);color:#fff;padding:10px 24px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.3);z-index:300;display:none;animation:toastIn .3s;white-space:nowrap}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.page-footer{text-align:center;color:var(--text-muted);font-size:11px;margin-top:24px;padding:16px 0;opacity:.5}
@media(max-width:600px){
  .page-wrap{padding:12px 10px 40px}
  .section-card{padding:20px 14px;border-radius:var(--radius-lg)}
  .letter-grid{grid-template-columns:repeat(auto-fill,minmax(70px,1fr))}
  .letter-card .ar{font-size:22px}
  .top-nav{padding:8px 10px}
  .quiz-options{grid-template-columns:1fr 1fr}
  .quiz-q{font-size:28px}
}
</style>
</head>
<body>
<nav class="top-nav">
  <div class="nav-left"><a href="./" class="nav-back">← 返回主页</a></div>

    <button class="nav-btn" onclick="toggleSearch()">🔍 搜索</button>

</nav>

<div class="page-wrap">
  <!-- Translator box -->
  <div class="section-card" style="padding:20px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
      <span style="font-size:20px">🌍</span>
      <span style="font-size:14px;font-weight:700;letter-spacing:.5px">翻译</span>
      <span style="font-size:11px;color:var(--text-muted)">中文 ↔ Қазақша</span>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <input id="srcText" placeholder="输入中文或哈萨克语..." style="flex:1;min-width:160px;padding:10px 14px;border:2px solid var(--border);border-radius:var(--radius-md);font-size:14px;outline:none;transition:all .25s;background:var(--card);color:var(--text);font-family:var(--font-zh);">
      <div style="display:flex;gap:6px">
        <button onclick="speakInput()" style="padding:10px 12px;background:var(--card);color:var(--accent);border:1.5px solid var(--border);border-radius:var(--radius-md);font-size:16px;cursor:pointer" title="朗读">🔊</button>
        <button onclick="translateText()" style="padding:10px 24px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:var(--radius-md);font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;box-shadow:0 4px 15px rgba(0,137,123,.3)">翻译</button>
        <button onclick="clearTrans()" style="padding:10px 12px;background:var(--card);color:var(--text-muted);border:1.5px solid var(--border);border-radius:var(--radius-md);font-size:14px;cursor:pointer">✕</button>
      </div>
    </div>
    <div id="dstBox" style="display:none;margin-top:10px;padding:12px 14px;background:var(--card);border-radius:var(--radius-md);border:2px solid var(--border);font-size:14px;color:var(--text);line-height:1.7;word-break:break-word">
      <span id="dstText" style="display:block;margin-bottom:8px"></span>
      <button onclick="speakOutput()" style="padding:6px 14px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:8px;font-size:12px;cursor:pointer;font-family:var(--font-zh)">🔊 朗读结果</button>
    </div>
  </div>

  <div class="section-card">
    <div style="text-align:center;margin-bottom:12px">
      <h1 style="font-size:26px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">🀄 用中文 · 学哈语阿拉伯字母</h1>
      <p style="font-size:13px;color:var(--text-sec);margin-top:2px">点击字母听发音 🔊 | 右键标记已学 ✓ · 中国哈萨克族使用的老哈文</p>
      <p style="font-size:12px;color:var(--text-muted);direction:rtl;font-family:var(--font-ab);margin-top:2px">قازاق ٵلىپبئى</p>
    </div>

    <div class="stats-bar" id="statsBar">
      <span class="stats-item">📚 <strong id="learnedCount">0</strong>/<span id="totalCount">37</span> 已学</span>
      <span class="stats-item">📈 <span id="progressPct">0%</span></span>
    </div>

    <div class="search-box" id="searchBox">
      <input class="search-input" id="searchInput" placeholder="🔍 搜索字母..." oninput="filterLetters()">
    </div>

    <div class="quiz-panel" id="quizPanel">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:12px;color:var(--text-sec)">🎯 听力测验 · 哪个字母？</span>
        <button onclick="toggleQuiz()" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px">✕</button>
      </div>
      <div class="quiz-qsound"><span class="play-hint" onclick="replayQuizSound()">🔊 再听一次</span></div>
      <div class="quiz-q" id="quizQuestion">🔊</div>
      <div class="quiz-options" id="quizOptions"></div>
      <div class="quiz-score">得分: <strong id="quizScore">0</strong> / <span id="quizTotal">0</span></div>
      <button class="quiz-next-btn" id="quizNextBtn" onclick="nextQuiz()" disabled>下一题 →</button>
    </div>

    <div class="tip-box">💡 中国哈萨克族使用阿拉伯字母书写哈萨克语（俗称"老哈文"）。点击字母听真人发音！</div>

    <div class="section-title">🌸 字母表</div>
    <div class="letter-grid" id="letterGrid"></div>

    <div class="section-title">✨ 9个哈语特有阿拉伯字母</div>
    <table class="data-table" id="specialTable">
      <tr><th>阿拉伯文</th><th>西里尔</th><th>中文谐音</th><th>说明</th></tr>
    </table>

    <div class="section-title">📖 常见词 · 对照</div>
    <table class="data-table" id="wordTable">
      <tr><th>阿拉伯文</th><th>西里尔</th><th>中文意思</th></tr>
    </table>
  </div>
  <div class="page-footer">🌸 包尔萨克 · 2026</div>
</div>

<div id="toast"></div>

<div class="modal-overlay" id="statsModal">
  <div class="modal-box">
    <div class="modal-title">📊 学习统计</div>
    <div class="modal-stats">
      <div class="modal-stat"><div class="val" id="mLearned">0</div><div class="lbl">已学</div></div>
      <div class="modal-stat"><div class="val" id="mTotal">0</div><div class="lbl">总共</div></div>
      <div class="modal-stat"><div class="val green" id="mPct">0%</div><div class="lbl">进度</div></div>
      <div class="modal-stat"><div class="val gold" id="mScore">0</div><div class="lbl">测验分数</div></div>
    </div>
    <button class="modal-close" onclick="toggleStats()">关闭</button>
  </div>
</div>

<script>
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js');
var USER_TYPE=parseInt(new URLSearchParams(window.location.search).get('type'))||parseInt(localStorage.getItem('kazakhUserType'))||3;
localStorage.setItem('kazakhUserType',USER_TYPE);

function initTheme(){var s=localStorage.getItem('kazakhTheme')||'dark';document.documentElement.setAttribute('data-theme',s);var b=document.getElementById('themeBtn');if(b)b.textContent=s==='light'?'🌙':'☀️'}
function toggleTheme(){var c=document.documentElement.getAttribute('data-theme');var n=c==='light'?'dark':'light';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('kazakhTheme',n);var b=document.getElementById('themeBtn');if(b)b.textContent=n==='light'?'🌙':'☀️'}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(function(){t.style.display='none'},1800)}

// Audio
var SK={'a':'a','ae':'ae','b':'b','v':'v','g':'g','gh_':'gh_','d':'d','e':'e','zh':'zh','z':'z','i':'i','y':'y','k':'k','q_':'q_','l':'l','m':'m','n':'n','ng_':'ng_','o':'o','oe_':'oe_','p':'p','r':'r','s':'s','t':'t','oo':'oo','uu_':'uu_','ue_':'ue_','f':'f','kh':'kh','h_':'h_','ts':'ts','ch':'ch','sh':'sh','yh':'yh','ii_':'ii_','eh':'eh','yoo':'yoo','yah':'yah'};
var WM={'salem':'salem','rahmet':'rahmet','qazaq':'qazaq','alma':'alma'};
function playKey(k){
  if(WM[k]){var a=new Audio('sounds/'+WM[k]+'.mp3');a.onerror=function(){new Audio('sounds/'+WM[k]+'.wav').play()};a.play().catch(function(){});return}
  if(SK[k]){var a=new Audio('sounds/'+SK[k]+'.mp3');a.onerror=function(){new Audio('sounds/'+SK[k]+'.wav').play()};a.play().catch(function(){new Audio('sounds/'+SK[k]+'.wav').play()})}
}

// Progress
function getP(){try{return JSON.parse(localStorage.getItem('kazakhProgress')||'{}')}catch(e){return{}}}
function saveP(p){localStorage.setItem('kazakhProgress',JSON.stringify(p))}
function isL(l){var p=getP();return p[l]&&p[l].learned}
function markL(l){var p=getP();p[l]={learned:true,date:new Date().toISOString().split('T')[0]};saveP(p);toast('✓ 已标记: '+l);updateStats()}
function unmarkL(l){var p=getP();delete p[l];saveP(p);toast('已取消: '+l);updateStats()}

// Data
var LETTERS=[
  {ar:'ا',cyr:'А а',zh:'啊',key:'a'},{ar:'اە',cyr:'Ә ә',zh:'哎',key:'ae'},{ar:'ب',cyr:'Б б',zh:'波',key:'b'},
  {ar:'ۋ',cyr:'В в',zh:'V',key:'v'},{ar:'گ',cyr:'Г г',zh:'哥',key:'g'},{ar:'ع',cyr:'Ғ ғ',zh:'哈',key:'gh_'},
  {ar:'د',cyr:'Д д',zh:'德',key:'d'},{ar:'ە',cyr:'Е е',zh:'耶',key:'e'},{ar:'ج',cyr:'Ж ж',zh:'浊',key:'zh'},
  {ar:'ز',cyr:'З з',zh:'兹',key:'z'},{ar:'ي',cyr:'И и',zh:'伊',key:'i'},{ar:'ي',cyr:'Й й',zh:'耶',key:'y'},
  {ar:'ك',cyr:'К к',zh:'科',key:'k'},{ar:'ق',cyr:'Қ қ',zh:'克',key:'q_'},{ar:'ل',cyr:'Л л',zh:'勒',key:'l'},
  {ar:'م',cyr:'М м',zh:'姆',key:'m'},{ar:'ن',cyr:'Н н',zh:'讷',key:'n'},{ar:'ڭ',cyr:'Ң ң',zh:'昂',key:'ng_'},
  {ar:'و',cyr:'О о',zh:'喔',key:'o'},{ar:'و',cyr:'Ө ө',zh:'鹅',key:'oe_'},{ar:'پ',cyr:'П п',zh:'坡',key:'p'},
  {ar:'ر',cyr:'Р р',zh:'勒',key:'r'},{ar:'س',cyr:'С с',zh:'斯',key:'s'},{ar:'ت',cyr:'Т т',zh:'特',key:'t'},
  {ar:'ۋ',cyr:'У у',zh:'乌',key:'oo'},{ar:'و',cyr:'Ұ ұ',zh:'乌',key:'uu_'},{ar:'ۇ',cyr:'Ү ү',zh:'淤',key:'ue_'},
  {ar:'ف',cyr:'Ф ф',zh:'夫',key:'f'},{ar:'ح',cyr:'Х х',zh:'哈',key:'kh'},{ar:'ھ',cyr:'Һ һ',zh:'哈',key:'h_'},
  {ar:'تس',cyr:'Ц ц',zh:'次',key:'ts'},{ar:'چ',cyr:'Ч ч',zh:'吃',key:'ch'},{ar:'ش',cyr:'Ш ш',zh:'师',key:'sh'},
  {ar:'ى',cyr:'Ы ы',zh:'呃',key:'yh'},{ar:'ى',cyr:'І і',zh:'伊',key:'ii_'},{ar:'ە',cyr:'Э э',zh:'诶',key:'eh'},

  {ar:'ق',cyr:'Қ қ',zh:'科',desc:'喉咙深处',key:'q_'},{ar:'ڭ',cyr:'Ң ң',zh:'eng',desc:'后鼻音',key:'ng_'},
  {ar:'و',cyr:'Ө ө',zh:'厄圆',desc:'圆唇厄',key:'oe_'},{ar:'و',cyr:'Ұ ұ',zh:'短乌',desc:'短促乌',key:'uu_'},
  {ar:'ۇ',cyr:'Ү ү',zh:'淤',desc:'前圆唇',key:'ue_'},{ar:'ى',cyr:'І і',zh:'短伊',desc:'短促衣',key:'ii_'},

var WORDS=[
  {ar:'سالەم',cyr:'Сәлем',zh:'你好 👋',key:'salem'},{ar:'راحمەت',cyr:'Рахмет',zh:'谢谢 🙏',key:'rahmet'},

];

function renderCard(d){
  var cls=isL(d.key)?' letter-card learned':' letter-card';
  return '<div class="'+cls+'" data-key="'+d.key+'" onclick="playKey(\''+d.key+'\');this.classList.add(\'playing\');setTimeout(function(){this.classList.remove(\'playing\')}.bind(this),600)" oncontextmenu="event.preventDefault();var k=this.getAttribute(\'data-key\');if(isL(k)){this.classList.remove(\'learned\');unmarkL(k)}else{this.classList.add(\'learned\');markL(k)}"><span class="sound-icon">🔊</span><div class="ar">'+d.ar+'</div><div class="cyr">'+d.cyr+'</div><div class="zh">'+d.zh+'</div></div>';
}

function render(){
  var h='';for(var i=0;i<LETTERS.length;i++)h+=renderCard(LETTERS[i]);document.getElementById('letterGrid').innerHTML=h;

  var st=document.querySelector('#specialTable');var ht='';
  for(var i=0;i<SPECIALS.length;i++){(function(d){ht+='<tr onclick="playKey(\''+d.key+'\')"><td class="ar">'+d.ar+'</td><td class="cyr">'+d.cyr+'</td><td>'+d.zh+'</td><td>'+d.desc+'</td></tr>'})(SPECIALS[i]);}
  st.innerHTML+=ht;

  var wt='';for(var i=0;i<WORDS.length;i++){(function(d){wt+='<tr onclick="playKey(\''+d.key+'\')"><td class="ar">'+d.ar+'</td><td class="cyr">'+d.cyr+'</td><td>'+d.zh+'</td></tr>'})(WORDS[i]);}
  document.querySelector('#wordTable').innerHTML+=wt;
  updateStats();
}

function updateStats(){
  var p=getP();var learned=0;
  for(var i=0;i<LETTERS.length;i++){if(p[LETTERS[i].key]&&p[LETTERS[i].key].learned)learned++;}
  var pct=Math.round(learned/LETTERS.length*100)||0;
  document.getElementById('learnedCount').textContent=learned;document.getElementById('totalCount').textContent=LETTERS.length;
  document.getElementById('progressPct').textContent=pct+'%';
  document.getElementById('mLearned').textContent=learned;document.getElementById('mTotal').textContent=LETTERS.length;document.getElementById('mPct').textContent=pct+'%';
}

function toggleSearch(){var s=document.getElementById('searchBox');s.classList.toggle('show');if(s.classList.contains('show'))document.getElementById('searchInput').focus()}
function filterLetters(){var q=document.getElementById('searchInput').value.trim().toLowerCase();document.querySelectorAll('.letter-card').forEach(function(c){c.style.display=c.textContent.toLowerCase().indexOf(q)>-1?'':'none'})}
function toggleStats(){var m=document.getElementById('statsModal');m.classList.toggle('show');updateStats();document.getElementById('mScore').textContent=parseInt(localStorage.getItem('kazakhQuizScore')||'0')}

// Quiz
var QUIZ_DATA=[],QUIZ_CURRENT=null,QUIZ_INDEX=0,QUIZ_SCORE=0,QUIZ_ANSWERED=false;
function initQuiz(){
  QUIZ_DATA=LETTERS.map(function(d){
    var ans=d.key;var opts=[ans];var pool=LETTERS.filter(function(x){return x.key!==ans});
    for(var i=pool.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=pool[i];pool[i]=pool[j];pool[j]=tmp}
    for(var k=0;k<3&&k<pool.length;k++)opts.push(pool[k].key);
    for(var i=opts.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=opts[i];opts[i]=opts[j];opts[j]=tmp}
    return {key:ans,answer:ans,options:opts,zh:d.zh,ar:d.ar};
  });
  QUIZ_SCORE=parseInt(localStorage.getItem('kazakhQuizScore')||'0');
}
function toggleQuiz(){var p=document.getElementById('quizPanel');p.classList.toggle('show');if(p.classList.contains('show')){document.querySelector('.quiz-btn').classList.add('quiz-active');initQuiz();QUIZ_INDEX=0;QUIZ_ANSWERED=false;showQuiz()}else document.querySelector('.quiz-btn').classList.remove('quiz-active')}
function showQuiz(){
  if(QUIZ_INDEX>=QUIZ_DATA.length){document.getElementById('quizQuestion').textContent='✅';document.getElementById('quizOptions').innerHTML='<div style="grid-column:1/-1;text-align:center;padding:16px;font-size:14px;color:var(--accent4)">🎉 全部完成！太棒了！</div>';document.getElementById('quizNextBtn').disabled=true;document.getElementById('quizScore').textContent=QUIZ_SCORE;document.getElementById('quizTotal').textContent=QUIZ_DATA.length;return}
  var q=QUIZ_DATA[QUIZ_INDEX];QUIZ_CURRENT=q;QUIZ_ANSWERED=false;
  document.getElementById('quizQuestion').textContent='🔊';document.getElementById('quizNextBtn').disabled=true;document.getElementById('quizNextBtn').textContent='下一题 →';
  var optsHtml='';for(var i=0;i<q.options.length;i++){var opt=LETTERS.find(function(l){return l.key===q.options[i]})||{};optsHtml+='<div class="quiz-opt" onclick="quizAnswer(this,\''+q.options[i]+'\',\''+q.answer+'\')">'+(opt.ar||q.options[i])+'</div>';}
  document.getElementById('quizOptions').innerHTML=optsHtml;document.getElementById('quizScore').textContent=QUIZ_SCORE;document.getElementById('quizTotal').textContent=QUIZ_DATA.length;
  setTimeout(function(){playKey(q.key)},300);
}
function replayQuizSound(){if(QUIZ_CURRENT)playKey(QUIZ_CURRENT.key)}
function quizAnswer(el,selected,correct){
  if(QUIZ_ANSWERED)return;QUIZ_ANSWERED=true;
  var opts=document.getElementById('quizOptions').querySelectorAll('.quiz-opt');
  for(var i=0;i<opts.length;i++){opts[i].style.pointerEvents='none';var optData=LETTERS.find(function(l){return l.key===correct})||{};if(opts[i].textContent.trim()===(optData.ar||correct))opts[i].classList.add('correct')}
  var optData=LETTERS.find(function(l){return l.key===selected})||{};
  if(selected===correct){QUIZ_SCORE++;localStorage.setItem('kazakhQuizScore',QUIZ_SCORE)}else el.classList.add('wrong');
  document.getElementById('quizScore').textContent=QUIZ_SCORE;document.getElementById('quizNextBtn').disabled=false;
}
function nextQuiz(){QUIZ_INDEX++;showQuiz()}

// Translator
function translateText(){
  var s=document.getElementById('srcText').value.trim();if(!s)return;
  var d=document.getElementById('dstBox');d.style.display='block';document.getElementById('dstText').textContent='⏳ 翻译中...';
  var x=new XMLHttpRequest();
  x.open('GET','https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=zh-CN&dt=t&q='+encodeURIComponent(s),true);
  x.onload=function(){
    try{var r=JSON.parse(x.responseText);var t='';if(r&&r[0])for(var i=0;i<r[0].length;i++)if(r[0][i]&&r[0][i][0])t+=r[0][i][0];
    if(!t||t===s){var x2=new XMLHttpRequest();x2.open('GET','https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=kk&dt=t&q='+encodeURIComponent(s),true);x2.onload=function(){try{var r2=JSON.parse(this.responseText);var t2='';if(r2&&r2[0])for(var i=0;i<r2[0].length;i++)if(r2[0][i]&&r2[0][i][0])t2+=r2[0][i][0];document.getElementById('dstText').textContent=t2||'无法翻译'}catch(e){document.getElementById('dstText').textContent='翻译失败'}};x2.send()}else{document.getElementById('dstText').textContent=t}
    }catch(e){document.getElementById('dstText').textContent='翻译出错'}
  };
  x.onerror=function(){document.getElementById('dstText').textContent='⚠ 网络错误'};
  x.send();
}
function speakInput(){var t=document.getElementById('srcText').value.trim();if(!t)return;speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(t);u.lang='zh-CN';u.rate=.85;speechSynthesis.speak(u)}
function speakOutput(){var t=document.getElementById('dstText').textContent;if(!t||t.startsWith('⏳')||t.startsWith('⚠'))return;speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(t);u.lang=t.match(/[\u0400-\u04ff\u0600-\u06ff]/)?'kk-KZ':'zh-CN';u.rate=.85;speechSynthesis.speak(u)}
function clearTrans(){document.getElementById('srcText').value='';document.getElementById('dstBox').style.display='none'}
document.addEventListener('DOMContentLoaded',function(){var e=document.getElementById('srcText');if(e)e.addEventListener('keydown',function(ev){if(ev.key==='Enter'&&!ev.shiftKey){ev.preventDefault();translateText()}})});

initTheme();render();
</script>
